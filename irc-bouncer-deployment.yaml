apiVersion: extensions/v1beta1
kind: Deployment
metadata:
  labels:
    app: shout
  name: shout
  annotations:
    kubernetes.io/change-cause: "Upgrade to 1.5"
spec:
  replicas: 1
  selector:
    matchLabels:
      app: shout
  strategy:
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 1
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: shout
        version: "1.1.7"
        type: irc
    spec:
      containers:
      - image: lsiocommunity/shout-irc
        imagePullPolicy: IfNotPresent
        name: irc-bouncer
        resources: {}
        ports:
        - containerPort: 9000
      dnsPolicy: ClusterFirst
      restartPolicy: Always
